steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/web:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/web:latest
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/web

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - health-fitness-web
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/web:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --service-account=health-fitness-runtime@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --port=8080
      # BACKEND_URL is what lib/api.ts and auth.ts read. The previous
      # cloudbuild used BACKEND_BASE_URL which did not match the code, so
      # the deployed web couldn't reach the backend.
      # AUTH_TRUST_HOST=true tells Auth.js v5 to accept proxied host
      # headers. AUTH_URL pins the canonical base URL so Auth.js doesn't
      # fall back to the container's bind hostname (0.0.0.0 from the
      # Dockerfile's ENV HOSTNAME) when building callback URLs.
      - --set-env-vars=BACKEND_URL=https://health-fitness-backend-mbysudfbja-uc.a.run.app,AUTH_TRUST_HOST=true,AUTH_URL=https://health-fitness-web-mbysudfbja-uc.a.run.app
      # AUTH_GOOGLE_* feed Auth.js; AUTH_SECRET encrypts the session
      # cookie. Without these the next-auth handlers throw on every
      # request to /api/auth/* and the body-comp connect flow can't
      # complete its OAuth round-trip.
      - --set-secrets=AUTH_GOOGLE_ID=oauth-web-client-id:latest,AUTH_GOOGLE_SECRET=oauth-web-client-secret:latest,AUTH_SECRET=authjs-secret:latest

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/web:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/web:latest

options:
  logging: CLOUD_LOGGING_ONLY
