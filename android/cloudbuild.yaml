steps:
  # Pull release signing material + the WEB OAuth client ID (compiled into
  # the APK via BuildConfig per android/app/build.gradle.kts).
  - id: fetch-secrets
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # --out-file writes raw bytes directly; needed for the binary
        # PKCS12 keystore so gcloud's stdout codec can't mangle it.
        gcloud secrets versions access latest \
          --secret=android-release-keystore --project=$PROJECT_ID \
          --out-file=/workspace/release.keystore
        gcloud secrets versions access latest \
          --secret=android-release-keystore-password --project=$PROJECT_ID \
          --out-file=/workspace/keystore.password
        gcloud secrets versions access latest \
          --secret=android-release-key-password --project=$PROJECT_ID \
          --out-file=/workspace/key.password
        gcloud secrets versions access latest \
          --secret=oauth-web-client-id --project=$PROJECT_ID \
          --out-file=/workspace/web-oauth-client-id

  # TODO(infra): replace cimg/android with a custom builder image baked
  # once and pushed to this project's Artifact Registry, with USER root so
  # the chown workaround can be removed.
  - id: build-release-apk
    name: cimg/android:2026.03.1
    dir: android
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # cimg/android runs as the unprivileged 'circleci' user but Cloud
        # Build mounts /workspace with root ownership; rechown so gradle
        # can write into android/build/.
        sudo chown -R "$(id -u):$(id -g)" /workspace
        export ANDROID_RELEASE_KEYSTORE=/workspace/release.keystore
        export ANDROID_KEYSTORE_PASSWORD="$(cat /workspace/keystore.password)"
        export ANDROID_KEY_ALIAS=upload
        export ANDROID_KEY_PASSWORD="$(cat /workspace/key.password)"
        export WEB_OAUTH_CLIENT_ID="$(cat /workspace/web-oauth-client-id)"
        ./gradlew :app:assembleRelease --no-daemon

  - id: distribute-firebase
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        FIREBASE_APP_ID="$(gcloud secrets versions access latest \
          --secret=firebase-android-app-id --project=$PROJECT_ID)"
        curl -sL https://firebase.tools | bash
        firebase appdistribution:distribute \
          android/app/build/outputs/apk/release/app-release.apk \
          --app "$$FIREBASE_APP_ID" \
          --groups "internal-testers" \
          --release-notes "main @ $SHORT_SHA"

artifacts:
  objects:
    location: gs://health-fitness-160-android-releases/$SHORT_SHA
    paths:
      - android/app/build/outputs/apk/release/app-release.apk

options:
  logging: CLOUD_LOGGING_ONLY
  # E2_HIGHCPU_8 has only 8 GB RAM; the release lint-vital + dex phase with a
  # 4 GB Gradle heap and parallel module workers OOM'd the daemon ("Gradle build
  # daemon disappeared"). Bump to E2_HIGHCPU_32 (32 vCPU / 32 GB) — the valid
  # Cloud Build machineType enum value with the most RAM.
  machineType: E2_HIGHCPU_32

timeout: 1800s
