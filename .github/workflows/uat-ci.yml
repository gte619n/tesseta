name: uat-ci

# End-to-end UAT: Selenium drives the real web UI against a locally-booted
# backend + Firestore emulator (no GCP creds, no Gemini key, no Google sign-in).
# See infra/scripts/uat.sh.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'backend/**'
      - 'uat/**'
      - 'infra/scripts/uat.sh'
      - 'infra/uat/**'
      - '.github/workflows/uat-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'backend/**'
      - 'uat/**'
      - 'infra/scripts/uat.sh'
      - 'infra/uat/**'
      - '.github/workflows/uat-ci.yml'

jobs:
  uat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install firebase-tools (Firestore emulator)
        run: npm i -g firebase-tools

      # ubuntu-latest ships Chrome; Selenium Manager resolves chromedriver.
      - name: Run UAT suite
        run: bash infra/scripts/uat.sh
        env:
          UAT_HEADLESS: 'true'

      - name: Upload UAT screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uat-screenshots
          path: uat/build/reports/
          if-no-files-found: ignore
