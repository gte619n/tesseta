# IMPL-02 dev-mode bypass. Accepts X-Dev-User in place of a Google JWT.
# Only enabled here — production application.yml hard-codes dev-mode: false.
# IMPL-03 turns Firestore off for unit tests; integration tests override
# this property back to true via @TestPropertySource alongside an emulator.
app:
  auth:
    dev-mode: true
    allowed-audiences: test-audience
  cors:
    allowed-origins: http://localhost:3000
  gcp:
    project-id: health-fitness-test
  persistence:
    firestore-enabled: false
  dexa:
    # Tests don't exercise the DEXA pipeline. Turning it off skips the
    # GCS + Gemini beans that would otherwise try to authenticate during
    # context load.
    enabled: false
  bloodtest:
    # Tests don't exercise the blood test pipeline. Turning it off skips the
    # GCS + Gemini beans that would otherwise try to authenticate during
    # context load.
    enabled: false
  nutrition:
    # IMPL-13 M3: turning capture off skips the GCS (MealPhotoStorage) +
    # Gemini (MealPhotoExtractor, NutritionLabelExtractor) beans, which would
    # otherwise require an API key / GCS auth at context load. The core
    # NutritionCaptureService still wires (its analyzer/storage ports are
    # optional via ObjectProvider).
    capture:
      enabled: false
    # IMPL-13 M4: turning images off skips the GCS (FoodImageStorage) + Gemini
    # (GeminiFoodImageGenerator) beans, which would otherwise require an API key /
    # GCS auth at context load. The core FoodImageService still wires (its
    # generator/storage/reader ports are optional via ObjectProvider).
    images:
      enabled: false
  medications:
    # Same story as dexa/bloodtest — the drug pipeline pulls in a Firestore-
    # backed DrugRepository (disabled via firestore-enabled above) and
    # GCS/Gemini wiring, so flip the feature off for tests instead of
    # stubbing every dependency.
    enabled: false
  goals:
    # Same rationale as bloodtest: GeminiGoalChatClient requires GEMINI_API_KEY
    # at construction time. The Goals chat tests install a fake GoalChatClient
    # via @TestConfiguration; everything else skips the live bean.
    enabled: false
  equipment:
    # EquipmentParserService.<init> throws if the parser API key is missing,
    # and the unconditional BulkImportService needs an EquipmentParser bean
    # to wire. Tests don't exercise bulk import, so pass a placeholder key —
    # the Gemini client is lazy and never reaches the wire here.
    parser-api-key: test-parser-key
  gym:
    bucket: test-gym-bucket
  googlehealth:
    # Tests that need Google Health behavior install a stub via
    # @TestConfiguration; the values below just keep @Value injection
    # quiet for unit-test contexts that load the full app.
    api-base-url: http://localhost:9999/healthapi
    oauth-token-url: http://localhost:9999/oauth
    backfill-days: 1460
    backfill-chunk-days: 365
    webhook-secret: test-webhook-secret
    kms-key-name: projects/test/locations/us-central1/keyRings/test/cryptoKeys/test
    web-oauth-client-id: test-client-id
    web-oauth-client-secret: test-client-secret
