steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    # Triggered builds check out the full repo at /workspace; dir scopes
    # the docker build context to /workspace/backend so the Dockerfile
    # resolves correctly. (Manual `gcloud builds submit backend/` uploads
    # just the subdir as /workspace, where this `dir` is a no-op.)
    dir: backend
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/backend:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/backend:latest
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/backend

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - health-fitness-backend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/backend:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --service-account=health-fitness-runtime@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --port=8080
      # Meal-photo capture runs Gemini analysis + studio-image generation, which
      # holds multi-MB images in memory; the default 512Mi OOM-kills the instance
      # mid-analysis, orphaning the in-memory finalize task (entry stuck ANALYZING
      # forever) and breaking image stores ("Broken pipe"). 2Gi gives headroom.
      - --memory=2Gi
      - --cpu=2
      # Cap requests per instance well below the default 80: each meal capture
      # marshals multi-MB images (and spawns background image generation), so
      # packing dozens onto one instance is what blew past memory. At 16, Cloud
      # Run scales out more small instances instead of overloading one.
      - --concurrency=16
      # IMPL-02: CORS allow-list is the deployed web origin. IMPL-04:
      # GCP_PROJECT_ID makes the Firestore + KMS clients pick the right
      # project; GOOGLE_HEALTH_KMS_KEY pins the envelope-encryption key.
      # FIRESTORE_DATABASE_ID=production routes deployed reads/writes to a
      # separate Firestore database (created via `gcloud firestore databases
      # create --database=production`). Local dev runs against (default).
      - --set-env-vars=^@^GCP_PROJECT_ID=$PROJECT_ID@CORS_ALLOWED_ORIGINS=https://app.tesseta.com,https://health-fitness-web-mbysudfbja-uc.a.run.app@GOOGLE_HEALTH_KMS_KEY=projects/$PROJECT_ID/locations/us-central1/keyRings/auth/cryptoKeys/google-health-refresh-tokens@FIRESTORE_DATABASE_ID=production
      # OAUTH_* feed the IMPL-02 JWT audience check and the IMPL-04
      # refresh-token exchange. GOOGLE_HEALTH_WEBHOOK_SECRET is the
      # shared secret Google sends in the Authorization header on push
      # notifications. SESSION_SIGNING_KEY is the HS256 key the backend uses
      # to mint native-client session access tokens (ADR-0010); without it the
      # resource server accepts Google tokens only and /api/auth/exchange 503s.
      - --set-secrets=OAUTH_ALLOWED_AUDIENCES=oauth-allowed-audiences:latest,OAUTH_WEB_CLIENT_ID=oauth-web-client-id:latest,OAUTH_WEB_CLIENT_SECRET=oauth-web-client-secret:latest,GOOGLE_HEALTH_WEBHOOK_SECRET=google-health-webhook-secret:latest,GEMINI_API_KEY=gemini_api_key:latest,SESSION_SIGNING_KEY=session-signing-key:latest

  # IMPL-12 Phase 5: keep the goals-sustained-reeval Cloud Run Job's
  # image in sync with the deployed service. The Job re-uses the same
  # container image; only the image tag changes per commit.
  #
  # Bootstrap order: the Job must already exist before this step can
  # succeed. Run `bash infra/scripts/deploy-goals-sustained-job.sh` once
  # per project to create it. The `|| true` makes that bootstrap step
  # safe — fresh projects (or a deleted Job) will fail this update
  # cleanly without breaking the service deploy.
  - id: update-goals-sustained-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs update goals-sustained-reeval \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/backend:$SHORT_SHA \
          --region=us-central1 \
          --project=$PROJECT_ID || true

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/backend:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/health-fitness/backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
