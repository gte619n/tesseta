spring:
  application:
    name: health-fitness-backend
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      # DEXA PDFs ship 1–3 MB. The controller enforces 25 MB explicitly;
      # this just stops Spring's framework-level filter from short-
      # circuiting at the default 1 MB and returning 403 before the
      # handler ever sees the request.
      max-file-size: 30MB
      max-request-size: 30MB

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# IMPL-02: backend validates Google ID tokens against accounts.google.com.
# `allowed-audiences` is the CSV of the three OAuth client IDs (web, android
# phone, android wear). `dev-mode` is hard-gated to application-test.yml.
# IMPL-03: Firestore is the persistence layer. `firestore-enabled` defaults
# to true; unit tests flip it off and provide an in-memory fake.
# IMPL-04: Google Health API integration. The webhook secret arrives in the
# Authorization header from Google's push notifications. KMS key envelope-
# encrypts the per-user refresh tokens (see ADR-0004). Backfill defaults
# to 4 years (1460 days) on first connect, chunked by year.
app:
  auth:
    allowed-audiences: ${OAUTH_ALLOWED_AUDIENCES:}
    dev-mode: false
  # ADR-0010: backend-issued session tokens for native clients (Android phone +
  # Wear). The Google ID token is exchanged once at /api/auth/exchange for a
  # short-lived HS256 access token + an opaque refresh token, so the app never
  # calls Credential Manager (and never shows its "Signing you in…" UI) again
  # until a real re-auth. signing-key arrives from Secret Manager at deploy;
  # empty disables issuance (exchange returns 503) and the resource server then
  # accepts Google tokens only.
  session:
    signing-key: ${SESSION_SIGNING_KEY:}
    issuer: tesseta-backend
    access-ttl: 1h
    refresh-ttl: 60d
  # Admin allowlist for @AdminOnly endpoints (comma-separated emails). Set
  # ADMIN_EMAILS in deployed environments; defaults to the project owner.
  admin:
    emails: ${ADMIN_EMAILS:evan.ruff@gmail.com}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  gcp:
    project-id: ${GCP_PROJECT_ID:health-fitness-160}
    # Local dev defaults to the (default) Firestore database; deployed
    # environments override with FIRESTORE_DATABASE_ID=production.
    firestore-database-id: ${FIRESTORE_DATABASE_ID:(default)}
  persistence:
    firestore-enabled: true
  # IMPL-AND-20 Phase 2: FCM silent-push fan-out. When enabled, the Firebase
  # Admin SDK is initialized with Application Default Credentials (no service-
  # account JSON key — the Cloud Run runtime SA holds
  # roles/firebasecloudmessaging.admin) and the real FirebaseMessaging transport
  # is wired. Disabled in application-test.yml so tests/local need no credentials;
  # a no-op transport handles fan-out there.
  fcm:
    enabled: ${FCM_ENABLED:true}
  gemini:
    # Single shared Gemini API key (GEMINI_API_KEY secret -> env at deploy time;
    # local dev reads the same var). All non-equipment Gemini services use one
    # google-genai Client built from this — see GeminiConfig. The per-module
    # `gemini-model` settings below still select the model per feature.
    api-key: ${GEMINI_API_KEY:}
  googlehealth:
    api-base-url: https://health.googleapis.com/v4
    oauth-token-url: https://oauth2.googleapis.com/token
    backfill-days: 1460
    backfill-chunk-days: 365
    webhook-secret: ${GOOGLE_HEALTH_WEBHOOK_SECRET:}
    kms-key-name: ${GOOGLE_HEALTH_KMS_KEY:projects/health-fitness-160/locations/us-central1/keyRings/auth/cryptoKeys/google-health-refresh-tokens}
    web-oauth-client-id: ${OAUTH_WEB_CLIENT_ID:}
    web-oauth-client-secret: ${OAUTH_WEB_CLIENT_SECRET:}
  dexa:
    bucket: ${DEXA_BUCKET:health-fitness-160-dexa-scans}
    # Direct Gemini API (not Vertex). API key in Secret Manager → env at
    # deploy time. Local dev reads it from the same env var.
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-3.5-flash}
  bloodtest:
    bucket: ${BLOODTEST_BUCKET:health-fitness-160-blood-tests}
    # Direct Gemini API (not Vertex). API key in Secret Manager → env at
    # deploy time. Local dev reads it from the same env var.
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-3.5-flash}
  nutrition:
    # IMPL-13: distinct-user confirmations promote a catalog food from
    # UNVERIFIED -> VERIFIED. Threshold is 1 today (confirming at log time
    # verifies); raise it later to turn on true multi-user validation.
    verify-threshold: ${NUTRITION_VERIFY_THRESHOLD:1}
    # IMPL-13 Milestone 3: AI capture (meal-photo itemization + label OCR) and
    # raw-photo storage. `capture.enabled` gates the GCS + Gemini beans
    # (MealPhotoStorage, MealPhotoExtractor, NutritionLabelExtractor) so unit
    # tests load the context without an API key — same pattern as dexa/bloodtest.
    bucket: ${NUTRITION_BUCKET:health-fitness-160-nutrition-photos}
    capture:
      enabled: ${NUTRITION_CAPTURE_ENABLED:true}
    # IMPL-13 Milestone 4: AI studio images — generated once per unique catalog
    # food, asynchronously, reused forever. `images.enabled` gates the GCS
    # (FoodImageStorage) + Gemini (GeminiFoodImageGenerator) beans so unit tests
    # load the context without an API key / GCS auth — same pattern as capture.
    # The studio image uses the project's image model (root CLAUDE.md). Reuses
    # the nutrition bucket above under a food-images/ prefix (no new bucket).
    images:
      enabled: ${NUTRITION_IMAGES_ENABLED:true}
      model: ${NUTRITION_IMAGE_MODEL:gemini-3.1-flash-image-preview}
    # Extraction runs on the SHARED gemini-3.5-flash model (NOT the Goals Pro
    # model). Direct Gemini API, same key/model env vars as dexa/bloodtest.
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-3.5-flash}
    # IMPL-13 Milestone 2 / ADR-0006: runtime barcode lookup falls back to the
    # Open Food Facts read API on a local catalog miss, then caches the result
    # back. Base URL is configurable so tests can point at a local stub.
    openfoodfacts:
      base-url: ${OFF_BASE_URL:https://world.openfoodfacts.org}
    # Open-data seeding Cloud Run Job (SPRING_PROFILES_ACTIVE=job-seed-foods).
    # Each path is a local file or http(s) URL, optionally gzip (.gz). Unset
    # paths are skipped. USDA = CC0 generics (VERIFIED); OFF = ODbL packaged
    # (UNVERIFIED). See infra/scripts/deploy-seed-foods-job.sh.
    seed:
      usda-path: ${NUTRITION_SEED_USDA_PATH:}
      off-path: ${NUTRITION_SEED_OFF_PATH:}
  goals:
    # IMPL-12: Goals chat uses Gemini tool calling (propose_goal_structure)
    # to design Goal/Phase/Step roadmaps. Direct Gemini API, same key as the
    # other modules. `enabled` gates the live client so unit tests can run
    # without an API key by providing a fake GoalChatClient bean.
    enabled: ${GOALS_CHAT_ENABLED:true}
    gemini-api-key: ${GEMINI_API_KEY:}
    # Goals chat is the ONE deliberate exception to the gemini-3.5-flash-only
    # convention: multi-phase roadmap design + reasoning over a full health
    # snapshot benefits materially from the stronger model, and goals planning
    # is low-volume/user-initiated so the cost impact is small. See
    # docs/decisions/ADR-0005-goals-chat-gemini-pro.md. Uses its OWN env var
    # (GOALS_GEMINI_MODEL), independent of the shared GEMINI_MODEL, so it can
    # be overridden without affecting the other (flash) modules.
    gemini-model: ${GOALS_GEMINI_MODEL:gemini-3.1-pro-preview}
  equipment:
    bucket: ${EQUIPMENT_BUCKET:health-fitness-160-equipment}
    # Gemini 3.1 Flash for equipment image generation (nano quality tier)
    vertex-ai-location: ${VERTEX_AI_LOCATION:us-central1}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_IMAGE_MODEL:gemini-3.1-flash-image-preview}
    gemini-quality: ${GEMINI_IMAGE_QUALITY:nano}
    parser-api-key: ${GEMINI_API_KEY:}
    parser-model: ${EQUIPMENT_PARSER_MODEL:gemini-3.5-flash}
    parser-enabled: ${EQUIPMENT_PARSER_ENABLED:true}
  # IMPL-14: global exercise catalog. Demo media (phase stills) uses the
  # project image model; never auto-published (admin review gate).
  exercises:
    bucket: ${EXERCISE_MEDIA_BUCKET:health-fitness-160-exercise-media}
    gemini-api-key: ${GEMINI_API_KEY:}
    # When true, an exercise must have APPROVED demo media (not just PUBLISHED)
    # before it is shown to users / offered to the program generator. Set false
    # to allow programming published exercises whose media isn't approved yet.
    require-approved-media: ${EXERCISE_REQUIRE_APPROVED_MEDIA:true}
    media:
      enabled: ${EXERCISE_MEDIA_ENABLED:true}
      model: ${EXERCISE_MEDIA_MODEL:gemini-3.1-flash-image-preview}
  # IMPL-15: AI workout-program design. Second deliberate exception to the
  # flash-only convention (see ADR-0007), on its OWN env var independent of
  # GEMINI_MODEL and GOALS_GEMINI_MODEL.
  workout-programs:
    enabled: ${WORKOUT_PROGRAMS_ENABLED:true}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${WORKOUT_PROGRAM_GEMINI_MODEL:gemini-3.1-pro-preview}
  # One-time job (profile job-split-blocks) that rewrites the imported-history
  # program's flat sessions into warm-up/main/cool-down blocks. Strength is
  # placed deterministically; warm-up vs cool-down for mobility uses
  # gemini-3.5-flash (the approved general-work model). Safe defaults: no
  # user-id → no-op; dry-run on until explicitly disabled.
  workouts:
    split:
      user-id: ${APP_WORKOUTS_SPLIT_USER_ID:}
      dry-run: ${APP_WORKOUTS_SPLIT_DRY_RUN:true}
      gemini-enabled: ${APP_WORKOUTS_SPLIT_GEMINI_ENABLED:true}
      model: ${APP_WORKOUTS_SPLIT_MODEL:gemini-3.5-flash}
  gym:
    bucket: ${GYM_BUCKET:health-fitness-160-gym-photos}
  medications:
    bucket: ${MEDICATIONS_BUCKET:health-fitness-160-medication-images}
    # Gemini with Google Search grounding for drug lookup
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-3.5-flash}
    # Imagen for medication image generation
    imagen-model: ${IMAGEN_MODEL:gemini-3.1-flash-image-preview}
